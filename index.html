<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GeoThumbs Toolbar</title>
    <style>
        /* 1. The Container: Full height, narrow width */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: rgba(25, 25, 25, 0.85); /* Dark transparent background */
            backdrop-filter: blur(10px);        /* Glass blur effect */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        #toolbar {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            padding-top: 20px;
        }

        /* 2. The Buttons: Circular shortcuts */
        .shortcut {
            width: 45px;
            height: 45px;
            margin-bottom: 15px;
            background: #333;
            border: 1px solid #444;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .shortcut:hover {
            background: #0078d4; /* Windows Blue */
            transform: scale(1.1);
            border-color: #00bcf2;
        }

        /* 3. Bottom Utility Section */
        .spacer {
            flex-grow: 1;
        }

        .settings-btn {
            margin-bottom: 20px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 18px;
        }

        .settings-btn:hover { color: white; }
    </style>
</head>
<body>

    <div id="toolbar">
        <div class="shortcut" title="Web Browser" onclick="launch('chrome')">🌐</div>
        <div class="shortcut" title="Code Editor" onclick="launch('code')">💻</div>
        <div class="shortcut" title="Terminal" onclick="launch('cmd')">🐚</div>
        <div class="shortcut" title="File Explorer" onclick="launch('explorer')">📂</div>

        <div class="spacer"></div>

        <button class="settings-btn" title="Close Toolbar" onclick="window.close()">✕</button>
    </div>

    <script>
        const { exec } = require('child_process');

        function launch(appType) {
            let command = '';

            // Mapping simple keys to Windows commands
            switch(appType) {
                case 'chrome': command = 'start chrome'; break;
                case 'code':   command = 'code'; break;
                case 'cmd':    command = 'start cmd'; break;
                case 'explorer': command = 'explorer .'; break;
                default: return;
            }

            exec(command, (error) => {
                if (error) {
                    console.error(`Launch Error: ${error}`);
                    alert("Could not find this application on your system.");
                }
            });
        }
    </script>
</body>
</html>
